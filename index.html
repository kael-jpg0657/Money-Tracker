// ── Smart built-in insights engine ──
function getInsights(income,expenses,balance,savRate,categoryBreakdown,expTxns,incTxns,mLbl){
  const tips=[];
  const savPct=parseFloat(savRate);
  const topCat=categoryBreakdown[0];
  const avgDay=expTxns.length>0?expenses/new Date().getDate():0;

  // Savings rate insight
  if(income===0&&expenses===0){
    tips.push({emoji:"👋",title:"Welcome!",msg:"Start logging your income and expenses to get personalized insights here.",color:"#FFD60A"});
  } else if(income===0){
    tips.push({emoji:"⚠️",title:"No income logged",msg:`You've spent ₱${Math.abs(expenses).toLocaleString()} but haven't logged any income yet this month.`,color:"#FF9F0A"});
  } else if(savPct>=30){
    tips.push({emoji:"🔥",title:"Excellent savings!",msg:`You're saving ${savRate}% of your income. Galing! Keep this up and consider investing the surplus.`,color:"#30D158"});
  } else if(savPct>=15){
    tips.push({emoji:"✅",title:"On track",msg:`Savings rate is ${savRate}%. Good job — try pushing toward 20–30% for a stronger financial cushion.`,color:"#30D158"});
  } else if(savPct>=0){
    tips.push({emoji:"⚡",title:"Low savings rate",msg:`Only ${savRate}% saved this month. Try cutting your top expense category to boost savings.`,color:"#FF9F0A"});
  } else {
    tips.push({emoji:"🚨",title:"Overspending!",msg:`You've spent ₱${Math.abs(balance).toLocaleString()} more than you earned. Review your expenses ASAP.`,color:"#FF453A"});
  }

  // Top category insight
  if(topCat&&expenses>0){
    const pct=topCat.pct;
    if(pct>40){
      tips.push({emoji:"📊",title:`Heavy ${topCat.name} spending`,msg:`${topCat.name} is eating ${pct}% of your budget (₱${topCat.amount.toLocaleString()}). Consider setting a weekly limit.`,color:"#FF9F0A"});
    } else {
      tips.push({emoji:"📊",title:"Top category",msg:`Your biggest expense is ${topCat.name} at ${pct}% of spending (₱${topCat.amount.toLocaleString()}).`,color:"#5AC8F5"});
    }
  }

  // Debt warning
  const debtCat=categoryBreakdown.find(c=>c.name==="Debt");
  if(debtCat&&income>0&&debtCat.amount/income>0.3){
    tips.push({emoji:"💳",title:"High debt payments",msg:`Debt payments are ${Math.round(debtCat.amount/income*100)}% of your income. Focus on paying off high-interest debt first.`,color:"#FF453A"});
  }

  // Daily average
  if(avgDay>0&&income>0){
    const daysLeft=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate()-new Date().getDate();
    const remaining=balance;
    if(remaining>0&&daysLeft>0){
      tips.push({emoji:"📅",title:"Daily budget remaining",msg:`You can spend ~₱${Math.round(remaining/daysLeft).toLocaleString()}/day for the rest of the month to break even.`,color:"#0A84FF"});
    }
  }

  // Income diversity
  if(incTxns.length>=2){
    const srcs=new Set(incTxns.map(t=>t.category)).size;
    if(srcs>=3) tips.push({emoji:"💼",title:"Diversified income",msg:`You have ${srcs} income sources this month. Multiple streams = stronger financial stability.`,color:"#BF5AF2"});
  }

  // Filipino money tips pool
  const staticTips=[
    {emoji:"🐷",title:"50-30-20 Rule",msg:"Try allocating: 50% needs, 30% wants, 20% savings. Adjust based on your actual spending patterns.",color:"#5AC8F5"},
    {emoji:"🛵",title:"Emergency fund",msg:"Aim for 3–6 months of expenses saved. Start small — even ₱500/week adds up to ₱26,000/year.",color:"#FFD60A"},
    {emoji:"📱",title:"Track daily",msg:"Logging transactions daily takes less than a minute but gives you full control over your money.",color:"#30D158"},
    {emoji:"☕",title:"Small habits matter",msg:"₱150 coffee every day = ₱4,500/month. Small cuts in frequent expenses compound fast.",color:"#FF9F0A"},
    {emoji:"🎯",title:"Set monthly goals",msg:"Define a savings target at the start of each month. Having a goal makes it 3x easier to stick to a budget.",color:"#BF5AF2"},
  ];
  // Add 1 rotating static tip based on current day
  tips.push(staticTips[new Date().getDate()%staticTips.length]);

  return tips.slice(0,5);
}

const fmt=n=>Math.abs(n).toLocaleString("en-PH");

function evalExpr(str){
  if(!str)return NaN;
  const s=String(str).replace(/×/g,"*").replace(/x/gi,"*").replace(/÷/g,"/").replace(/−/g,"-").replace(/[^0-9+\-*/.()]/g,"");
  if(!s||/[+\-*/.]$/.test(s))return NaN;
  try{const r=Function('"use strict";return('+s+')')();return typeof r==="number"&&isFinite(r)?r:NaN;}catch{return NaN;}
}

function computeMonth(allTxns,year,month){
  const ms=`${year}-${String(month+1).padStart(2,"0")}`;
  const txns=allTxns.filter(t=>t.date.startsWith(ms));
  let income=0,expenses=0;
  txns.forEach(t=>{if(t.income)income+=t.amount;else expenses+=Math.abs(t.amount);});
  const catMap={};
  txns.filter(t=>!t.income).forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+Math.abs(t.amount);});
  const categoryBreakdown=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([name,amount],i)=>({name,amount,pct:expenses>0?Math.round((amount/expenses)*100):0,color:CAT_COLORS[i%CAT_COLORS.length]}));
  const srcMap={};
  txns.filter(t=>t.income).forEach(t=>{if(!srcMap[t.category])srcMap[t.category]={amount:0,icon:CAT_ICONS[t.category]||"💰",color:CAT_COLORS[(INC_CATS.indexOf(t.category)+5)%CAT_COLORS.length]};srcMap[t.category].amount+=t.amount;});
  const incomeSources=Object.entries(srcMap).map(([name,v])=>({name,...v})).sort((a,b)=>b.amount-a.amount);
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const isCurr=today.getFullYear()===year&&today.getMonth()===month;
  const lastDay=isCurr?Math.min(today.getDate(),daysInMonth):daysInMonth;
  const startDay=Math.max(1,lastDay-13);
  const n=lastDay-startDay+1;
  const dailyExp=Array(n).fill(0),dailyInc=Array(n).fill(0);
  txns.forEach(t=>{const d=parseInt(t.date.slice(8,10),10);if(d>=startDay&&d<=lastDay){const i=d-startDay;if(t.income)dailyInc[i]+=t.amount;else dailyExp[i]+=Math.abs(t.amount);}});
  return{income,expenses,txns,categoryBreakdown,incomeSources,dailyExp,dailyInc,startDay,lastDay,daysInMonth};
}

function groupByDate(txns){
  const m={};txns.forEach(t=>{(m[t.date]=m[t.date]||[]).push(t);});
  return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
}

function DonutChart({data,total,size=120}){
  const r=44,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  let off=0;
  const slices=data.map(d=>{const len=(d.pct/100)*circ;const s={...d,da:`${len} ${circ-len}`,do:-off*circ/100};off+=d.pct;return s;});
  return(
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,flexShrink:0}}>
      {slices.length===0&&<circle cx={cx} cy={cy} r={r} fill="none" stroke={C.trackBg} strokeWidth={9}/>}
      {slices.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={9} strokeDasharray={s.da} strokeDashoffset={s.do} style={{transform:"rotate(-90deg)",transformOrigin:`${cx}px ${cy}px`}}/>)}
      <text x={cx} y={cy-4} textAnchor="middle" fill={C.text} fontSize={12} fontWeight="700">₱{fmt(total)}</text>
      <text x={cx} y={cy+11} textAnchor="middle" fill={C.textTert} fontSize={8} letterSpacing="1">TOTAL</text>
    </svg>
  );
}

function TxnRow({t,onDelete,onEdit}){
  const [swipeX,setSwipeX]=useState(0);
  const [swiped,setSwiped]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const touchStartX=useRef(null);
  const touchStartY=useRef(null);
  const isScrolling=useRef(false);
  const DELETE_THRESHOLD=72;

  const onTouchStart=e=>{
    touchStartX.current=e.touches[0].clientX;
    touchStartY.current=e.touches[0].clientY;
    isScrolling.current=false;
  };

  const onTouchMove=e=>{
    if(touchStartX.current===null)return;
    const dx=e.touches[0].clientX-touchStartX.current;
    const dy=e.touches[0].clientY-touchStartY.current;
    // If vertical scroll intent, ignore
    if(!isScrolling.current&&Math.abs(dy)>Math.abs(dx)){isScrolling.current=true;}
    if(isScrolling.current)return;
    if(dx<0){
      e.stopPropagation();
      const clamped=Math.max(dx,-DELETE_THRESHOLD);
      setSwipeX(clamped);
    } else if(swiped&&dx>0){
      setSwipeX(Math.min(0,dx-DELETE_THRESHOLD));
    }
  };

  const onTouchEnd=()=>{
    if(isScrolling.current){touchStartX.current=null;return;}
    if(swipeX<-DELETE_THRESHOLD*0.55){
      setSwipeX(-DELETE_THRESHOLD);
      setSwiped(true);
    } else {
      setSwipeX(0);
      setSwiped(false);
    }
    touchStartX.current=null;
  };

  const closeSwipe=()=>{setSwipeX(0);setSwiped(false);};

  function doDelete(){
    setConfirmDel(false);
    closeSwipe();
    onDelete(t.id);
  }

  return(
    <>
      <div style={{position:"relative",overflow:"hidden",borderBottom:`1px solid ${C.border}`}}>
        {/* Delete button behind */}
        <div style={{position:"absolute",right:0,top:0,bottom:0,width:DELETE_THRESHOLD,background:C.red,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"0 10px 10px 0"}}>
          <button
            onClick={e=>{e.stopPropagation();setConfirmDel(true);}}
            style={{width:"100%",height:"100%",background:"none",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}
          >
            <span style={{fontSize:18}}>🗑️</span>
            Delete
          </button>
        </div>

        {/* Row content */}
        <div
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          onClick={e=>{if(swiped){e.stopPropagation();closeSwipe();}}}
          style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",position:"relative",userSelect:"none",WebkitUserSelect:"none",transform:`translateX(${swipeX}px)`,transition:touchStartX.current===null?"transform 0.25s ease":"none",background:C.bg||C.sheetSolid,zIndex:1}}
        >
          {/* Icon */}
          <div style={{width:42,height:42,borderRadius:13,background:t.income?C.greenSoft:C.card,border:`1px solid ${t.income?C.green+"44":C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
            {t.icon||"💸"}
          </div>
          {/* Label + category */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,color:C.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.label}</div>
            <div style={{fontSize:11,color:C.textTert,marginTop:2}}>{t.category}</div>
          </div>
          {/* Amount + edit */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
            <div style={{fontSize:14,fontWeight:700,color:t.income?C.green:C.text,letterSpacing:"-0.3px"}}>{t.income?"+":"−"}₱{fmt(t.amount)}</div>
            <button onClick={e=>{e.stopPropagation();closeSwipe();onEdit(t);}} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px",color:C.textTert,fontSize:10,cursor:"pointer",letterSpacing:"0.3px"}}>Edit</button>
          </div>
        </div>
      </div>

      {/* Confirm delete modal */}
      {confirmDel&&(
        <div onClick={()=>setConfirmDel(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.modalBg,border:`1px solid ${C.borderMid}`,borderRadius:"24px 24px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:430,animation:"slideUp 0.2s ease"}}>
            <div style={{width:52,height:52,borderRadius:16,background:C.redSoft,border:`1px solid ${C.red}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 16px"}}>🗑️</div>
            <div style={{textAlign:"center",marginBottom:6}}>
              <div style={{fontSize:17,fontWeight:700,color:C.text,letterSpacing:"-0.3px"}}>Delete transaction?</div>
              <div style={{fontSize:13,color:C.textTert,marginTop:6,lineHeight:1.5}}>
                <span style={{color:C.text,fontWeight:500}}>{t.label}</span> · {t.income?"+":"−"}₱{fmt(t.amount)}
              </div>
            </div>
            <div style={{height:1,background:C.border,margin:"18px 0"}}/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDel(false)} style={{flex:1,padding:"13px",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,color:C.textSec,fontWeight:600,fontSize:15,cursor:"pointer"}}>Cancel</button>
              <button onClick={doDelete} style={{flex:1,padding:"13px",background:C.red,border:"none",borderRadius:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function MonthNav({year,month,onChange}){
  const now=new Date();
  const isCurr=now.getFullYear()===year&&now.getMonth()===month;
  const prev=()=>{const d=new Date(year,month-1,1);onChange(d.getFullYear(),d.getMonth());};
  const next=()=>{const d=new Date(year,month+1,1);onChange(d.getFullYear(),d.getMonth());};
  const navBtn={background:C.card,border:`1px solid ${C.border}`,borderRadius:8,width:28,height:28,color:C.textSec,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"};
  return(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <button onClick={prev} style={navBtn}>‹</button>
      <span style={{fontSize:11,color:C.textTert,fontWeight:600,minWidth:88,textAlign:"center",letterSpacing:"0.3px"}}>{monthLabel(year,month).toUpperCase()}</span>
      <button onClick={next} disabled={isCurr} style={{...navBtn,opacity:isCurr?0.35:1,cursor:isCurr?"default":"pointer"}}>›</button>
    </div>
  );
}

function App(){

    const isInc=addType==="income";
    if(editId){
      setAllTxns(p=>p.map(t=>t.id===editId?{...t,label:form.label,amount:isInc?amount:-amount,category:form.category,income:isInc,date:form.date,icon:isInc?"💰":"💸"}:t));

  const seen=new Set(),same=[],other=[];
  pool.forEach(t=>{const k=t.label.toLowerCase();if(seen.has(k))return;if(lq&&!k.includes(lq))return;seen.add(k);(t.category===form.category?same:other).push(t);});

  // ── AI INSIGHT COMPONENT ──
  function AiSpendingInsight({categoryBreakdown,expenses,income,mLbl}){
    const [insight,setInsight]=useState(null);
    const [loading,setLoading]=useState(false);
    const [open,setOpen]=useState(false);
    const lastKey=useRef(null);

    async function fetchInsight(){
      if(categoryBreakdown.length===0)return;
      const key=categoryBreakdown.map(c=>c.name+c.amount).join("|");
      if(key===lastKey.current&&insight){setOpen(true);return;}
      setOpen(true);
      setLoading(true);
      const breakdown=categoryBreakdown.map(c=>`${CAT_ICONS[c.name]||"💸"} ${c.name}: ₱${c.amount.toLocaleString()} (${c.pct}%)`).join("\n");
      const prompt=`You are a friendly Filipino personal finance coach. Analyze this monthly spending for ${mLbl}:\n\nTotal Expenses: ₱${expenses.toLocaleString()}\n${income>0?`Total Income: ₱${income.toLocaleString()}\nSavings Rate: ${income>0?(((income-expenses)/income)*100).toFixed(1):0}%`:"No income logged"}\n\nCategory Breakdown:\n${breakdown}\n\nGive a SHORT, warm, actionable insight (3-4 sentences max). Mention the top spending category by name, give one specific tip to reduce it, and one encouraging note. Use Filipino context (mention peso ₱, use "suki", "tipid", etc occasionally). Be conversational, not formal. No bullet points, just natural text.`;

      try{
        if(!AI_READY){setInsight("⚠️ AI not configured yet. Deploy the Cloudflare Worker proxy and update AI_PROXY_URL in the app.");setLoading(false);return;}
        const res=await fetch(AI_PROXY_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
        });
        const data=await res.json();
        const text=data.content?.map(b=>b.text||"").join("")||"Unable to generate insight.";
        setInsight(text);
        lastKey.current=key;
      }catch{
        setInsight("Could not load insight. Please try again.");
      }
      setLoading(false);
    }

    return(
      <div style={{marginTop:4}}>
        {!open?(
          <button onClick={fetchInsight} style={{width:"100%",padding:"12px",background:`linear-gradient(135deg,${C.goldSoft},${C.blueSoft})`,border:`1px solid ${C.gold}44`,borderRadius:14,color:C.gold,fontWeight:600,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span style={{fontSize:18}}>✦</span> Get AI Spending Insight
          </button>
        ):(
          <div style={{background:`linear-gradient(135deg,rgba(255,214,10,0.07),rgba(10,132,255,0.07))`,border:`1px solid ${C.gold}33`,borderRadius:16,padding:"14px 16px",position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div style={{width:28,height:28,borderRadius:9,background:C.goldSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>✦</div>
                <span style={{fontSize:12,fontWeight:700,color:C.gold,letterSpacing:"0.5px"}}>AI INSIGHT</span>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                {!loading&&<button onClick={fetchInsight} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"3px 8px",color:C.textTert,fontSize:10,cursor:"pointer"}}>↺ Refresh</button>}
                <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",color:C.textTert,fontSize:16,cursor:"pointer",lineHeight:1}}>×</button>
              </div>
            </div>
            {loading?(
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0"}}>
                <div style={{display:"flex",gap:4}}>
                  {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.gold,animation:"bounce 1.2s infinite",animationDelay:`${i*0.18}s`}}/>)}
                </div>
                <span style={{fontSize:12,color:C.textTert}}>Analyzing your spending…</span>
              </div>
            ):(
              <p style={{fontSize:13,color:C.textSec,lineHeight:1.65,margin:0}}>{insight}</p>
            )}
          </div>
        )}
      </div>
    );
  }

            :groupByDate(txns).map(([date,dt])=>{
              const inc=dt.filter(t=>t.income).reduce((s,t)=>s+t.amount,0);
              const exp=dt.filter(t=>!t.income).reduce((s,t)=>s+Math.abs(t.amount),0);
              return(
                <div key={date}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0 8px"}}>
                    <span style={{fontSize:12,color:C.textTert,fontWeight:600,letterSpacing:"0.5px"}}>{fmtDate(date)}</span>
                    <span style={{fontSize:12}}>{inc>0&&<span style={{color:C.green,marginRight:6}}>+{fmt(inc)}</span>}{exp>0&&<span style={{color:C.red}}>−{fmt(exp)}</span>}</span>
                  </div>
                  {dt.map(t=><TxnRow key={t.id} t={t} onDelete={deleteTxn} onEdit={openEdit}/>)}
                </div>
              );
            })
          }
        </Card>
      </Scroll>
    );
  }

  // ── CALENDAR ──
  function CalendarPage(){
    const dim=new Date(yr,mo+1,0).getDate();
    const fw=new Date(yr,mo,1).getDay();
    const wdays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const dmap={};
    txns.forEach(t=>{const d=parseInt(t.date.slice(8,10),10);const m=dmap[d]||(dmap[d]={inc:0,exp:0});if(t.income)m.inc+=t.amount;else m.exp+=Math.abs(t.amount);});
    const cells=[];
    for(let i=0;i<fw;i++)cells.push(null);
    for(let d=1;d<=dim;d++)cells.push(d);
    const selTxns=calDay?txns.filter(t=>parseInt(t.date.slice(8,10),10)===calDay):[];
    return(
      <Scroll>
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:17,fontWeight:700,color:C.text,letterSpacing:"-0.3px"}}>{mLbl}</span>
            <MonthNav year={yr} month={mo} onChange={setMonth}/>

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
            {wdays.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:C.textTert,fontWeight:600,paddingBottom:4}}>{d}</div>)}
            {cells.map((d,i)=>{
              if(d===null)return<div key={i}/>;
              const tot=dmap[d];const has=!!tot&&(tot.inc>0||tot.exp>0);const active=calDay===d;
              return(
                <div key={i} onClick={()=>has&&setCalDay(active?null:d)} style={{minHeight:56,borderRadius:10,background:has?C.greenSoft:C.card,border:`1px solid ${active?C.gold:(has?C.green+"33":C.border)}`,padding:"5px 2px 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:has?"pointer":"default"}}>
                  <span style={{fontSize:13,fontWeight:600,color:C.text}}>{d}</span>
                  {tot?.inc>0&&<span style={{fontSize:8,color:C.green,fontWeight:700,lineHeight:1.3}}>{fmt(tot.inc)}</span>}
                  {tot?.exp>0&&<span style={{fontSize:8,color:C.red,fontWeight:700,lineHeight:1.3}}>{fmt(tot.exp)}</span>}

          <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:14}}>
            <span style={{fontSize:11,color:C.textSec,display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:2,background:C.green}}/>Income</span>
            <span style={{fontSize:11,color:C.textSec,display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:2,background:C.red}}/>Expense</span>
          </div>
        </Card>
        {calDay&&<Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:15,fontWeight:700,color:C.text}}>{fmtDate(`${yr}-${String(mo+1).padStart(2,"0")}-${String(calDay).padStart(2,"0")}`)}</span>
            <button onClick={()=>setCalDay(null)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"50%",width:26,height:26,color:C.textSec,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
          {selTxns.map(t=><TxnRow key={t.id} t={t} onDelete={deleteTxn} onEdit={openEdit}/>)}
        </Card>}
        {txns.length===0&&<EmptyState emoji="📅" title="No transactions this month" subtitle="Add transactions and they'll appear on the calendar" onAction={()=>setShowAdd(true)}/>}
      </Scroll>
    );
  }

  // ── BUDGET & SAVINGS PLANNER ──
  function PlannerPage(){
    const LS_PLAN=LS_KEY+"_plan";
    function loadPlan(){try{const r=localStorage.getItem(LS_PLAN);if(r)return JSON.parse(r);}catch{}return null;}
    function savePlan(p){try{localStorage.setItem(LS_PLAN,JSON.stringify(p));}catch{}}

    const initPlan=loadPlan()||{budgets:{},goals:[]};
    const [budgets,setBudgets]=useState(initPlan.budgets);
    const [goals,setGoals]=useState(initPlan.goals);
    const [editBudgetCat,setEditBudgetCat]=useState(null);
    const [budgetInput,setBudgetInput]=useState("");
    const [showGoalForm,setShowGoalForm]=useState(false);
    const [goalForm,setGoalForm]=useState({name:"",target:"",saved:"",emoji:"🎯",deadline:""});
    const [editGoalIdx,setEditGoalIdx]=useState(null);
    const [aiPlan,setAiPlan]=useState(null);
    const [aiLoading,setAiLoading]=useState(false);
    const [plannerTab,setPlannerTab]=useState("budget");

    useEffect(()=>savePlan({budgets,goals}),[budgets,goals]);

    // Budget helpers
    function saveBudget(){
      const v=parseFloat(budgetInput);
      if(!editBudgetCat||isNaN(v)||v<=0)return;
      setBudgets(p=>({...p,[editBudgetCat]:v}));
      setEditBudgetCat(null);setBudgetInput("");
    }
    function removeBudget(cat){setBudgets(p=>{const n={...p};delete n[cat];return n;});}

    // Goal helpers
    function saveGoal(){
      const t=parseFloat(goalForm.target),s=parseFloat(goalForm.saved||0);
      if(!goalForm.name||isNaN(t)||t<=0)return;
      const g={name:goalForm.name,target:t,saved:s,emoji:goalForm.emoji,deadline:goalForm.deadline};
      if(editGoalIdx!==null){setGoals(p=>p.map((x,i)=>i===editGoalIdx?g:x));setEditGoalIdx(null);}
      else setGoals(p=>[...p,g]);
      setGoalForm({name:"",target:"",saved:"",emoji:"🎯",deadline:""});
      setShowGoalForm(false);
    }
    function deleteGoal(i){setGoals(p=>p.filter((_,idx)=>idx!==i));}
    function addSaved(i,amt){setGoals(p=>p.map((g,idx)=>idx===i?{...g,saved:Math.min(g.target,g.saved+amt)}:g));}

    // AI Plan
    async function generateAiPlan(){
      setAiLoading(true);setAiPlan(null);
      const bLines=EXP_CATS.filter(c=>budgets[c]).map(c=>`${CAT_ICONS[c]||"💸"} ${c}: budget ₱${budgets[c].toLocaleString()}, spent ₱${(categoryBreakdown.find(x=>x.name===c)?.amount||0).toLocaleString()}`).join("\n")||"No budgets set yet.";
      const gLines=goals.map(g=>`${g.emoji} ${g.name}: ₱${g.saved.toLocaleString()} / ₱${g.target.toLocaleString()}${g.deadline?` (by ${g.deadline})`:""}` ).join("\n")||"No savings goals yet.";
      const prompt=`You are a friendly Filipino financial coach. Here is the user's MoneyTracker data for ${mLbl}:

Income: ₱${income.toLocaleString()}
Expenses: ₱${expenses.toLocaleString()}
Savings Rate: ${savRate}%

Budget vs Actual:
${bLines}

Savings Goals:
${gLines}

Top expense categories: ${categoryBreakdown.slice(0,3).map(c=>`${c.name} (${c.pct}%)`).join(", ")||"none"}

Write a SHORT personalized budget + savings plan (5-7 sentences). Cover: which budget categories are over/under, one concrete tip per problem area, how much they should set aside monthly for their goals, and one motivational closing. Use Filipino tone (₱, casual, warm). No bullet points, just flowing paragraphs.`;
      try{
        if(!AI_READY){setAiPlan("⚠️ AI not configured yet. Deploy the Cloudflare Worker proxy and update AI_PROXY_URL in the app.");setAiLoading(false);return;}
      const res=await fetch(AI_PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
        const data=await res.json();
        setAiPlan(data.content?.map(b=>b.text||"").join("")||"Unable to generate plan.");
      }catch{setAiPlan("Could not load plan. Check connection.");}
      setAiLoading(false);
    }

    const GOAL_EMOJIS=["🎯","🏠","✈️","💍","🚗","📱","🎓","💻","🏖️","💰","🎁","🏍️","🐾","👶","🏋️"];

    return(
      <Scroll>
        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#1a1030 0%,#0a1628 100%)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:28,padding:"22px 20px 18px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",background:"rgba(191,90,242,0.2)",filter:"blur(30px)"}}/>
          <div style={{fontSize:11,color:"rgba(235,235,245,0.4)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:6}}>Budget & Savings Planner</div>
          <div style={{fontSize:26,fontWeight:700,color:C.text,letterSpacing:"-0.5px",marginBottom:4}}>Plan your money 💜</div>
          <div style={{fontSize:13,color:"rgba(235,235,245,0.5)",lineHeight:1.5}}>Set category budgets, track savings goals, and get an AI-powered monthly plan.</div>
          <div style={{display:"flex",gap:8,marginTop:14}}>
            {["budget","goals","ai"].map(t=>(
              <button key={t} onClick={()=>setPlannerTab(t)} style={{flex:1,padding:"9px 0",borderRadius:12,border:"none",background:plannerTab===t?"#BF5AF2":C.card,color:plannerTab===t?"#fff":C.textSec,fontWeight:plannerTab===t?700:400,fontSize:12,cursor:"pointer",letterSpacing:"0.3px"}}>
                {t==="budget"?"📊 Budgets":t==="goals"?"🎯 Goals":"✦ AI Plan"}
              </button>
            ))}
          </div>
        </div>

        {/* ── BUDGETS TAB ── */}
        {plannerTab==="budget"&&(
          <>
            {income>0&&<Card style={{background:"linear-gradient(135deg,rgba(48,209,88,0.08),rgba(10,132,255,0.06))",border:`1px solid ${C.green}33`}}>
              <div style={{fontSize:12,color:C.textTert,marginBottom:10,textTransform:"uppercase",letterSpacing:"1px"}}>Monthly Summary</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>
                {[["Income",income,C.green],["Budgeted",Object.values(budgets).reduce((a,b)=>a+b,0),"#BF5AF2"],["Spent",expenses,C.red]].map(([l,v,col])=>(
                  <div key={l} style={{background:C.card,borderRadius:12,padding:"10px 6px"}}>
                    <div style={{fontSize:13,fontWeight:700,color:col,letterSpacing:"-0.3px"}}>₱{fmt(v)}</div>
                    <div style={{fontSize:9,color:C.textTert,marginTop:2,textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div>
                  </div>
                ))}
              </div>
            </Card>}

            <Card>
              <SectionLabel>Category Budgets</SectionLabel>
              {EXP_CATS.map(cat=>{
                const budget=budgets[cat]||0;
                const spent=categoryBreakdown.find(c=>c.name===cat)?.amount||0;
                const pct=budget>0?Math.min(100,(spent/budget)*100):0;

                return(
                  <div key={cat} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>

                        <span style={{fontSize:13,color:C.text,fontWeight:500}}>{cat}</span>
                        {over&&<span style={{fontSize:9,background:C.redSoft,color:C.red,borderRadius:6,padding:"2px 6px",fontWeight:700}}>OVER</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:12,color:over?C.red:C.textSec}}>₱{fmt(spent)}{budget>0?` / ₱${fmt(budget)}`:""}</span>
                        <button onClick={()=>{setEditBudgetCat(cat);setBudgetInput(budget?String(budget):"");}} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 7px",color:C.textTert,fontSize:10,cursor:"pointer"}}>Edit</button>
                        {budget>0&&<button onClick={()=>removeBudget(cat)} style={{background:"none",border:"none",color:C.textTert,fontSize:14,cursor:"pointer",lineHeight:1}}>×</button>}
                      </div>
                    </div>
                    {budget>0&&<div style={{height:5,background:C.trackBg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${color}88,${color})`,borderRadius:3,transition:"width 0.5s ease"}}/></div>}
                    {!budget&&<div style={{height:5,background:C.trackBg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:"100%",background:`${C.red}33`,borderRadius:3}}/></div>}
                  </div>
                );
              })}
              {/* Add budget for unset categories */}
              <div style={{marginTop:6}}>
                <div style={{fontSize:11,color:C.textTert,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.8px"}}>Set budgets</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {EXP_CATS.filter(c=>!budgets[c]).map(c=>(
                    <button key={c} onClick={()=>{setEditBudgetCat(c);setBudgetInput("");}} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"5px 10px",color:C.textSec,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>

                </div>
              </div>

          </>

                      ))}

                </Card>
              );
            })}
            {goals.length>0&&!showGoalForm&&<button onClick={()=>{setEditGoalIdx(null);setGoalForm({name:"",target:"",saved:"",emoji:"🎯",deadline:""});setShowGoalForm(true);}} style={{width:"100%",padding:"12px",background:C.card,border:`1px dashed ${C.border}`,borderRadius:14,color:C.textSec,fontSize:13,cursor:"pointer",fontWeight:500}}>+ Add Another Goal</button>}
          </>
        )}

        {/* ── AI PLAN TAB ── */}
        {plannerTab==="ai"&&(
          <Card>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <div style={{width:32,height:32,borderRadius:10,background:"rgba(191,90,242,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✦</div>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:C.text}}>AI Monthly Plan</div>
                <div style={{fontSize:11,color:C.textTert}}>Based on your budgets, goals & spending</div>
              </div>
            </div>
            {!aiPlan&&!aiLoading&&(
              <div style={{textAlign:"center",padding:"16px 0"}}>
                <div style={{fontSize:36,marginBottom:10}}>🤖</div>
                <div style={{fontSize:13,color:C.textSec,lineHeight:1.6,marginBottom:16}}>Get a personalized budget + savings plan powered by Claude AI, tailored to your actual spending data for {mLbl}.</div>
                <button onClick={generateAiPlan} style={{padding:"13px 28px",background:"linear-gradient(135deg,#BF5AF2,#0A84FF)",border:"none",borderRadius:16,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>✦ Generate My Plan</button>
              </div>
            )}
            {aiLoading&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:"24px 0"}}>
                <div style={{display:"flex",gap:5}}>
                  {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#BF5AF2",animation:"bounce 1.2s infinite",animationDelay:`${i*0.18}s`}}/>)}
                </div>
                <div style={{fontSize:12,color:C.textTert}}>Crafting your personalized plan…</div>
              </div>
            )}
            {aiPlan&&!aiLoading&&(
              <>
                <p style={{fontSize:13,color:C.textSec,lineHeight:1.7,margin:"0 0 16px"}}>{aiPlan}</p>
                <button onClick={generateAiPlan} style={{width:"100%",padding:"11px",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,color:C.textSec,fontSize:12,cursor:"pointer",fontWeight:500}}>↺ Regenerate Plan</button>
              </>
            )}
          </Card>
        )}

        {/* Budget edit modal */}
        {editBudgetCat&&(
          <div onClick={()=>{setEditBudgetCat(null);setBudgetInput("");}} style={{position:"fixed",inset:0,background:C.overlay,backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.modalBg,border:`1px solid ${C.borderMid}`,borderTop:"2px solid #BF5AF2",borderRadius:"28px 28px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:430,animation:"slideUp 0.22s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                <span style={{fontWeight:700,fontSize:17,color:C.text}}>{CAT_ICONS[editBudgetCat]||"💸"} {editBudgetCat} Budget</span>
                <button onClick={()=>{setEditBudgetCat(null);setBudgetInput("");}} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"50%",width:30,height:30,color:C.textSec,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
              <input autoFocus value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} placeholder="Monthly budget (₱)" type="number" inputMode="decimal" style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",color:C.text,fontSize:15,marginBottom:14,outline:"none"}}/>
              <button onClick={saveBudget} disabled={!budgetInput||isNaN(parseFloat(budgetInput))} style={{width:"100%",padding:"14px",background:"#BF5AF2",border:"none",borderRadius:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",opacity:!budgetInput?0.4:1}}>Save Budget</button>
            </div>
          </div>
        )}

        {/* Goal form modal */}
        {showGoalForm&&(
          <div onClick={()=>{setShowGoalForm(false);setEditGoalIdx(null);}} style={{position:"fixed",inset:0,background:C.overlay,backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.modalBg,border:`1px solid ${C.borderMid}`,borderTop:"2px solid #BF5AF2",borderRadius:"28px 28px 0 0",padding:"24px 20px 36px",width:"100%",maxWidth:430,animation:"slideUp 0.22s ease",maxHeight:"85vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                <span style={{fontWeight:700,fontSize:17,color:C.text}}>{editGoalIdx!==null?"Edit Goal":"New Savings Goal"}</span>
                <button onClick={()=>{setShowGoalForm(false);setEditGoalIdx(null);}} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"50%",width:30,height:30,color:C.textSec,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
              <div style={{fontSize:12,color:C.textTert,marginBottom:8}}>Pick an emoji</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
                {GOAL_EMOJIS.map(e=><button key={e} onClick={()=>setGoalForm(p=>({...p,emoji:e}))} style={{width:36,height:36,borderRadius:10,border:`2px solid ${goalForm.emoji===e?"#BF5AF2":C.border}`,background:goalForm.emoji===e?"rgba(191,90,242,0.15)":C.card,fontSize:18,cursor:"pointer"}}>{e}</button>)}
              </div>
              {[["Goal name","name","text","e.g. Bohol Trip, Emergency Fund"],["Target amount (₱)","target","number",""],["Already saved (₱)","saved","number","0"]].map(([ph,key,type,pl])=>(
                <input key={key} value={goalForm[key]} onChange={e=>setGoalForm(p=>({...p,[key]:e.target.value}))} placeholder={pl||ph} type={type} inputMode={type==="number"?"decimal":undefined} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"12px 16px",color:C.text,fontSize:15,marginBottom:8,outline:"none"}}/>
              ))}
              <div style={{fontSize:12,color:C.textTert,marginBottom:6}}>Target date (optional)</div>
              <input value={goalForm.deadline} onChange={e=>setGoalForm(p=>({...p,deadline:e.target.value}))} type="date" style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"12px 16px",color:C.text,fontSize:15,marginBottom:16,outline:"none",colorScheme:isDark?"dark":"light"}}/>
              <button onClick={saveGoal} disabled={!goalForm.name||!goalForm.target} style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#BF5AF2,#0A84FF)",border:"none",borderRadius:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",opacity:!goalForm.name||!goalForm.target?0.4:1}}>
                {editGoalIdx!==null?"Save Changes":"Add Goal"}
              </button>
            </div>
          </div>
        )}
      </Scroll>
    );
  }


  // ── DATA (IMPORT / EXPORT / STORAGE) ──
  function DataPage(){
    const [importText,setImportText]=useState("");
    const [importError,setImportError]=useState("");
    const [importSuccess,setImportSuccess]=useState("");
    const [showConfirmClear,setShowConfirmClear]=useState(false);
    const [showImportBox,setShowImportBox]=useState(false);

    // Storage info
    function getStorageInfo(){
      try{
        const raw=localStorage.getItem(LS_KEY)||"{}";
        const bytes=new Blob([raw]).size;
        const kb=(bytes/1024).toFixed(2);
        const planRaw=localStorage.getItem(LS_KEY+"_plan")||"{}";
        const planBytes=new Blob([planRaw]).size;
        const planKb=(planBytes/1024).toFixed(2);
        const totalKb=(parseFloat(kb)+parseFloat(planKb)).toFixed(2);
        const pct=((parseFloat(totalKb)/5120)*100).toFixed(1);
        return{txnKb:kb,planKb,totalKb,pct,txnCount:allTxns.length};
      }catch{return{txnKb:"?",planKb:"?",totalKb:"?",pct:"?",txnCount:0};}
    }
    const si=getStorageInfo();

    // Export to JSON
    function exportJSON(){
      const data={
        exportedAt:new Date().toISOString(),
        version:"moneytracker-v2",
        transactions:allTxns,
        plan:JSON.parse(localStorage.getItem(LS_KEY+"_plan")||"{}"),
        settings:{dark:isDark,year:yr,month:mo}
      };
      const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=`moneytracker-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Export to CSV
    function exportCSV(){
      const headers=["Date","Description","Category","Type","Amount (PHP)"];
      const rows=allTxns.map(t=>[
        t.date,
        `"${t.label.replace(/"/g,'""')}"`,
        t.category,
        t.income?"Income":"Expense",
        t.income?t.amount:Math.abs(t.amount)
      ]);
      const csv=[headers.join(","),...rows.map(r=>r.join(","))].join("\n");
      const blob=new Blob([csv],{type:"text/csv"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=`moneytracker-transactions-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Import from JSON
    function doImport(){
      setImportError("");setImportSuccess("");
      try{
        const parsed=JSON.parse(importText);
        if(!parsed.transactions||!Array.isArray(parsed.transactions)) throw new Error("Invalid format: missing transactions array.");
        const txns=parsed.transactions.map(t=>({
          id:t.id||Date.now()+Math.random(),
          date:t.date,label:t.label,
          amount:typeof t.amount==="number"?t.amount:parseFloat(t.amount),
          category:t.category||"Others",
          income:!!t.income,
          icon:t.icon||(t.income?"💰":"💸")
        }));
        // Merge — avoid duplicate IDs
        setAllTxns(prev=>{
          const existingIds=new Set(prev.map(t=>t.id));
          const newTxns=txns.filter(t=>!existingIds.has(t.id));
          return[...prev,...newTxns];
        });
        if(parsed.plan){try{localStorage.setItem(LS_KEY+"_plan",JSON.stringify(parsed.plan));}catch{}}
        setImportSuccess(`✅ Imported ${txns.length} transactions successfully!`);
        setImportText("");
        setShowImportBox(false);
      }catch(e){
        setImportError("❌ "+e.message);
      }
    }

    function clearAllData(){
      setAllTxns([]);
      try{localStorage.removeItem(LS_KEY);localStorage.removeItem(LS_KEY+"_plan");}catch{}
      setShowConfirmClear(false);
    }

    const barW=Math.min(100,parseFloat(si.pct)||0);
    const barColor=barW>80?C.red:barW>50?C.gold:C.green;

    return(
      <Scroll>
        {/* Header */}
        <div style={{background:"linear-gradient(145deg,#0e1a2e 0%,#0e1a18 100%)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:28,padding:"24px 20px 20px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:"rgba(10,132,255,0.18)",filter:"blur(40px)",pointerEvents:"none"}}/>
          <div style={{fontSize:11,color:"rgba(235,235,245,0.35)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:6}}>Data Management</div>
          <div style={{fontSize:26,fontWeight:700,color:C.text,letterSpacing:"-0.5px",marginBottom:4}}>Import & Export ⬡</div>
          <div style={{fontSize:13,color:"rgba(235,235,245,0.5)",lineHeight:1.5}}>Back up your data, transfer to another device, or import from a backup file.</div>
        </div>

        {/* Storage Info */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:14,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:18}}>💾</span> Local Storage Usage
          </div>
          <div style={{height:8,background:C.trackBg,borderRadius:6,overflow:"hidden",marginBottom:10}}>
            <div style={{height:"100%",width:`${barW}%`,background:`linear-gradient(90deg,${barColor}88,${barColor})`,borderRadius:6,transition:"width 0.6s ease"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
            {[
              ["Transactions",si.txnKb+" KB","#5AC8F5"],
              ["Planner",si.planKb+" KB","#BF5AF2"],
              ["Total",si.totalKb+" KB",barColor]
            ].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:700,color:col,letterSpacing:"-0.3px"}}>{val}</div>
                <div style={{fontSize:9,color:C.textTert,marginTop:2,textTransform:"uppercase",letterSpacing:"0.5px"}}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[
              ["Total Records",si.txnCount+" txns","#FFD60A"],
              ["Storage Limit","~5 MB","rgba(235,235,245,0.3)"]
            ].map(([lbl,val,col])=>(
              <div key={lbl} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:700,color:col}}>{val}</div>
                <div style={{fontSize:9,color:C.textTert,marginTop:2,textTransform:"uppercase",letterSpacing:"0.5px"}}>{lbl}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,fontSize:11,color:C.textTert,lineHeight:1.6,padding:"8px 10px",background:C.card,borderRadius:10,border:`1px solid ${C.border}`}}>
            ℹ️ Data is stored locally on your device using localStorage. It is <strong style={{color:C.text}}>not synced to the cloud</strong>. Export regularly to avoid data loss.
          </div>
        </div>

        {/* Export */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:18}}>📤</span> Export Data
          </div>
          <div style={{fontSize:12,color:C.textTert,marginBottom:14,lineHeight:1.5}}>Download all your transactions and settings as a backup file. Use JSON to restore later, or CSV to open in Excel / Google Sheets.</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button onClick={exportJSON} style={{width:"100%",padding:"14px",background:`linear-gradient(135deg,${C.blueSoft},rgba(10,132,255,0.12))`,border:`1px solid ${C.blue}44`,borderRadius:14,color:C.blue,fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:18}}>📦</span> Export as JSON (Full Backup)
            </button>
            <button onClick={exportCSV} style={{width:"100%",padding:"14px",background:`linear-gradient(135deg,${C.greenSoft},rgba(48,209,88,0.08))`,border:`1px solid ${C.green}44`,borderRadius:14,color:C.green,fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:18}}>📊</span> Export as CSV (Excel / Sheets)
            </button>
          </div>
          <div style={{marginTop:10,fontSize:11,color:C.textTert,textAlign:"center"}}>
            {allTxns.length} transaction{allTxns.length!==1?"s":""} will be exported
          </div>
        </div>

        {/* Import */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:"16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:18}}>📥</span> Import Data
          </div>
          <div style={{fontSize:12,color:C.textTert,marginBottom:14,lineHeight:1.5}}>Restore from a previously exported JSON backup. Duplicate transactions (same ID) will be skipped automatically.</div>
          {importSuccess&&<div style={{marginBottom:12,padding:"10px 14px",background:C.greenSoft,border:`1px solid ${C.green}33`,borderRadius:12,fontSize:13,color:C.green,fontWeight:500}}>{importSuccess}</div>}
          {importError&&<div style={{marginBottom:12,padding:"10px 14px",background:C.redSoft,border:`1px solid ${C.red}33`,borderRadius:12,fontSize:13,color:C.red,fontWeight:500}}>{importError}</div>}
          {!showImportBox?(
            <button onClick={()=>setShowImportBox(true)} style={{width:"100%",padding:"14px",background:`linear-gradient(135deg,rgba(255,214,10,0.08),rgba(255,214,10,0.04))`,border:`1px dashed ${C.gold}55`,borderRadius:14,color:C.gold,fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span style={{fontSize:18}}>📂</span> Paste JSON to Import
            </button>
          ):(
            <>
              <textarea
                value={importText}
                onChange={e=>setImportText(e.target.value)}
                placeholder={"Paste your exported JSON backup here...\n\nExample:\n{\n  \"version\": \"moneytracker-v2\",\n  \"transactions\": [...]\n}"}
                rows={8}
                style={{width:"100%",background:C.bg||"#060608",border:`1px solid ${importError?C.red:C.border}`,borderRadius:14,padding:"12px 14px",color:C.text,fontSize:12,fontFamily:"monospace",resize:"vertical",outline:"none",marginBottom:10,lineHeight:1.6}}
              />
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowImportBox(false);setImportText("");setImportError("");}} style={{flex:1,padding:"12px",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,color:C.textSec,fontWeight:600,fontSize:14,cursor:"pointer"}}>Cancel</button>
                <button onClick={doImport} disabled={!importText.trim()} style={{flex:2,padding:"12px",background:importText.trim()?C.gold:"rgba(255,214,10,0.2)",border:"none",borderRadius:12,color:importText.trim()?"#060608":C.textTert,fontWeight:700,fontSize:14,cursor:importText.trim()?"pointer":"default"}}>Import & Merge</button>
              </div>
            </>
          )}
        </div>

        {/* AI Status */}
        <div style={{background:C.card,border:`1px solid ${AI_READY?C.green+"44":C.gold+"44"}`,borderRadius:20,padding:"16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:18}}>{AI_READY?"🟢":"🟡"}</span> AI Features Status
          </div>
          <div style={{fontSize:12,color:C.textTert,marginBottom:12,lineHeight:1.5}}>
            {AI_READY
              ?"AI spending insights and budget planner are active and working."
              :"AI features need a Cloudflare Worker proxy to work outside Claude.ai. See setup instructions below."}
          </div>
          {!AI_READY&&(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:8}}>📋 Setup Steps</div>
              {[
                "Go to workers.cloudflare.com — sign up free",
                "Create a new Worker, paste the worker.js file",
                "Go to Settings → Variables → add secret: ANTHROPIC_API_KEY",
                "Deploy the worker, copy your worker URL",
                'Open index.html, find AI_PROXY_URL and replace "YOUR_CLOUDFLARE_WORKER_URL_HERE" with your URL',
                "Re-upload index.html to GitHub"
              ].map((step,i)=>(
                <div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:C.gold+"22",border:`1px solid ${C.gold}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:C.gold,flexShrink:0,marginTop:1}}>{i+1}</div>
                  <div style={{fontSize:12,color:C.textSec,lineHeight:1.5}}>{step}</div>
                </div>
              ))}
            </div>
          )}
          {AI_READY&&(
            <div style={{padding:"8px 12px",background:C.greenSoft,border:`1px solid ${C.green}33`,borderRadius:10,fontSize:12,color:C.green,fontWeight:500}}>
              ✅ Connected to: <span style={{fontFamily:"monospace",fontSize:11}}>{AI_PROXY_URL}</span>
            </div>
          )}
        </div>

        {/* Danger Zone */}
        <div style={{background:C.redSoft,border:`1px solid ${C.red}33`,borderRadius:20,padding:"16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:4,display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:18}}>⚠️</span> Danger Zone
          </div>
          <div style={{fontSize:12,color:C.textTert,marginBottom:14,lineHeight:1.5}}>This will permanently delete all your transactions and settings. This action cannot be undone. Make sure to export first!</div>
          <button onClick={()=>setShowConfirmClear(true)} style={{width:"100%",padding:"13px",background:"none",border:`1px solid ${C.red}55`,borderRadius:14,color:C.red,fontWeight:700,fontSize:14,cursor:"pointer"}}>
            🗑️ Clear All Data
          </button>
        </div>

        {/* Confirm clear modal */}
        {showConfirmClear&&(
          <div onClick={()=>setShowConfirmClear(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div onClick={e=>e.stopPropagation()} style={{background:C.modalBg,border:`1px solid ${C.borderMid}`,borderTop:`2px solid ${C.red}`,borderRadius:"28px 28px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:430,animation:"slideUp 0.2s ease"}}>
              <div style={{width:52,height:52,borderRadius:16,background:C.redSoft,border:`1px solid ${C.red}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 16px"}}>⚠️</div>
              <div style={{textAlign:"center",marginBottom:6}}>
                <div style={{fontSize:17,fontWeight:700,color:C.text,letterSpacing:"-0.3px"}}>Clear all data?</div>
                <div style={{fontSize:13,color:C.textTert,marginTop:8,lineHeight:1.6}}>This will permanently delete <span style={{color:C.red,fontWeight:600}}>{allTxns.length} transactions</span> and all planner data. This cannot be undone.</div>
              </div>
              <div style={{height:1,background:C.border,margin:"18px 0"}}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setShowConfirmClear(false)} style={{flex:1,padding:"13px",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,color:C.textSec,fontWeight:600,fontSize:15,cursor:"pointer"}}>Cancel</button>
                <button onClick={clearAllData} style={{flex:1,padding:"13px",background:C.red,border:"none",borderRadius:14,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>Yes, Delete All</button>
              </div>
            </div>
          </div>
        )}
      </Scroll>
    );
  }

  const TABS=[{id:"dashboard",label:"Overview",emoji:"◈"},{id:"expenses",label:"Expenses",emoji:"↓"},{id:"income",label:"Income",emoji:"↑"},{id:"balance",label:"Balance",emoji:"◉"},{id:"calendar",label:"Calendar",emoji:"▦"},{id:"insights",label:"Insights",emoji:"✦"},{id:"planner",label:"Planner",emoji:"💜"},{id:"data",label:"Data",emoji:"⬡"}];

  return(
    <div style={{background:C.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",fontFamily:"-apple-system,'SF Pro Display','Inter',sans-serif",color:C.text,display:"flex",flexDirection:"column",position:"relative"}}>
      <style>{`input::placeholder{color:${C.textTert};}select option{background:${C.selectBg};}`}</style>

      <div style={{height:8,background:C.bg}}/>
      <div style={{padding:"10px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`,background:C.topBarBg,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(20px)"}}>
        <div>
          <div style={{fontSize:10,color:C.textTert,letterSpacing:"1px",textTransform:"uppercase"}}>{mLbl}</div>
          <div style={{fontSize:20,fontWeight:700,color:C.text,letterSpacing:"-0.5px"}}>MoneyTracker</div>
        </div>
        <button onClick={()=>setIsDark(d=>!d)} style={{position:"relative",width:56,height:30,borderRadius:16,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",padding:0,flexShrink:0}}>
          <span style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",fontSize:13,opacity:isDark?0.35:1}}>☀️</span>
          <span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",fontSize:13,opacity:isDark?1:0.35}}>🌙</span>
          <div style={{position:"absolute",top:2,left:isDark?28:2,width:24,height:24,borderRadius:"50%",background:"#FFD60A",boxShadow:`0 0 8px ${C.goldGlow}`,transition:"left 0.25s ease"}}/>
        </button>
      </div>

      <div style={{flex:1,overflowY:"hidden",display:"flex",flexDirection:"column",paddingTop:14}}>
        {tab==="dashboard"&&<DashboardPage/>}
        {tab==="expenses"&&<ExpensesPage/>}
        {tab==="income"&&<IncomePage/>}
        {tab==="balance"&&<BalancePage/>}
        {tab==="calendar"&&<CalendarPage/>}
        {tab==="insights"&&<InsightsPage/>}
        {tab==="planner"&&<PlannerPage/>}
        {tab==="data"&&<DataPage/>}
      </div>

      <button onClick={()=>{setEditId(null);setForm({label:"",amount:"",category:"Food",date:new Date().toISOString().slice(0,10)});setShowAdd(true);}} style={{position:"fixed",bottom:74,left:"50%",transform:"translateX(-50%)",width:56,height:56,borderRadius:"50%",background:C.gold,border:`3px solid ${C.bg}`,color:"#060608",fontSize:26,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 18px ${C.goldGlow}`,cursor:"pointer",zIndex:110}}>+</button>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:C.navBg,borderTop:`1px solid ${C.border}`,backdropFilter:"blur(24px)",display:"flex",justifyContent:"space-around",padding:"10px 0 20px",zIndex:100,overflowX:"auto"}}>
        {TABS.map(n=>{
          const active=tab===n.id;
          return(
            <button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",color:active?C.gold:C.textTert,fontSize:9,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",padding:"0 6px",flexShrink:0}}>
              <span style={{fontSize:20,lineHeight:1,filter:active?`drop-shadow(0 0 6px ${C.goldGlow})`:"none",transform:active?"scale(1.1)":"scale(1)",display:"block"}}>{n.emoji}</span>
              <span style={{letterSpacing:"0.2px",fontWeight:active?600:400}}>{n.label}</span>
            </button>
          );
        })}
      </div>

      {/* ── ADD / EDIT MODAL ── */}
      {showAdd&&(
        <div onClick={e=>e.target===e.currentTarget&&closeModal()} style={{position:"fixed",inset:0,background:C.overlay,backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:C.modalBg,border:`1px solid ${C.borderMid}`,borderTop:`2px solid ${C.gold}`,borderRadius:"28px 28px 0 0",padding:"20px 20px 36px",width:"100%",maxWidth:430,animation:"slideUp 0.25s ease",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <span style={{fontWeight:700,fontSize:18,letterSpacing:"-0.3px",color:C.text}}>{editId?"Edit Transaction":"Add Transaction"}</span>
              <button onClick={closeModal} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"50%",width:30,height:30,color:C.textSec,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            <div style={{display:"flex",background:C.card,borderRadius:14,padding:4,marginBottom:14,border:`1px solid ${C.border}`}}>
              {["expense","income"].map(t=>(
                <button key={t} onClick={()=>{setAddType(t);setForm(p=>({...p,category:t==="income"?"Salary":"Food"}));}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:addType===t?C.gold:"none",color:addType===t?"#060608":C.textSec,fontWeight:addType===t?700:400,fontSize:14,cursor:"pointer"}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>
              ))}
            </div>

            <input value={form.label} onChange={e=>setForm(p=>({...p,label:e.target.value}))} placeholder="Description" type="text" style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",color:C.text,fontSize:15,marginBottom:8,outline:"none"}}/>

            {suggestions.length>0&&(
              <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:8}}>
                {suggestions.map(t=>(
                  <button key={t.id} onClick={()=>setForm(p=>({...p,label:t.label,category:t.category}))} style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,background:C.card,border:`1px solid ${C.border}`,borderRadius:50,padding:"6px 12px",color:C.textSec,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
                    <span>{t.icon||"💸"}</span>{t.label}
                  </button>
                ))}
              </div>
            )}

            <div style={{position:"relative",marginBottom:showCalc?8:10}}>
              <input value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="Amount (₱)" type="text" inputMode="decimal" style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 50px 13px 16px",color:C.text,fontSize:15,outline:"none"}}/>
              <button onClick={()=>setShowCalc(s=>!s)} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:10,background:showCalc?C.gold:C.cardHover,border:`1px solid ${C.border}`,color:showCalc?"#060608":C.textSec,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>🧮</button>
            </div>

            {!isNaN(calcPreview)&&<div style={{fontSize:13,color:C.gold,fontWeight:600,marginTop:-4,marginBottom:8,paddingLeft:4}}>= ₱{fmt(calcPreview)}</div>}

            {showCalc&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:14}}>
                {[["7","8","9","÷"],["4","5","6","×"],["1","2","3","−"],["C","0",".","+"]].flat().map(k=>(
                  <button key={k} onClick={()=>{if(k==="C"){setForm(p=>({...p,amount:""}));return;}setForm(p=>({...p,amount:p.amount+k}));}} style={{padding:"12px 0",borderRadius:12,background:["÷","×","−","+"].includes(k)?C.blueSoft:(k==="C"?C.redSoft:C.card),border:`1px solid ${C.border}`,color:["÷","×","−","+"].includes(k)?C.blue:(k==="C"?C.red:C.text),fontSize:16,fontWeight:600,cursor:"pointer"}}>{k}</button>
                ))}
                <button onClick={()=>setForm(p=>({...p,amount:p.amount.slice(0,-1)}))} style={{gridColumn:"span 2",padding:"12px 0",borderRadius:12,background:C.card,border:`1px solid ${C.border}`,color:C.text,fontSize:16,fontWeight:600,cursor:"pointer"}}>⌫</button>
                <button onClick={()=>{const r=evalExpr(form.amount);if(!isNaN(r))setForm(p=>({...p,amount:String(Math.round(r*100)/100)}));}} style={{gridColumn:"span 2",padding:"12px 0",borderRadius:12,background:C.gold,border:"none",color:"#060608",fontSize:16,fontWeight:700,cursor:"pointer"}}>=</button>
              </div>
            )}

            <input value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} type="date" style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",color:C.text,fontSize:15,marginBottom:8,outline:"none",colorScheme:isDark?"dark":"light"}}/>

            <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"13px 16px",color:C.text,fontSize:15,marginBottom:18,outline:"none",appearance:"none"}}>
              {(addType==="expense"?EXP_CATS:INC_CATS).map(c=><option key={c}>{c}</option>)}
            </select>

            <button onClick={saveTxn} disabled={!form.label||isNaN(evalExpr(form.amount))||evalExpr(form.amount)<=0} style={{width:"100%",padding:"15px",background:C.gold,border:"none",borderRadius:16,color:"#060608",fontWeight:700,fontSize:16,cursor:"pointer",letterSpacing:"-0.2px",opacity:(!form.label||isNaN(evalExpr(form.amount))||evalExpr(form.amount)<=0)?0.4:1}}>
              {editId?"Save Changes":"Save Transaction"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
